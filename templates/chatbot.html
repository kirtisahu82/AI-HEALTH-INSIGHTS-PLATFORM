{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <h3 class="mb-3 text-center">AI Health Assistant 🤖💚</h3>

    <div class="card p-4 shadow">
        <div id="chat-box" style="
            height: 350px; 
            overflow-y: scroll; 
            border: 1px solid #ccc; 
            padding: 10px;
        "></div>

        <div class="mt-3 d-flex">
            <input id="user-input" class="form-control" placeholder="Ask anything about health...">
            <button onclick="sendMessage()" class="btn btn-success ms-2">Send</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>

{% endblock %}
