{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-3">🍽 Add Meal & Food Log</h2>

    <div class="card p-4 shadow mx-auto" style="max-width:500px;">

        <form method="POST">
            <label class="form-label">Meal Type</label>
            <select class="form-control mb-3" name="meal_type" required>
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Snacks">Snacks</option>
            </select>

            <label>Description</label>
            <input class="form-control mb-3" type="text" name="description" placeholder="2 roti">

            
            <button class="btn btn-success w-100">Calculate Calories and Add Meal</button>
        </form>

        <hr>

        <h5 class="text-center">Today's Food Log</h5>

        <p><b>Total Calories:</b> {{ total }} kcal</p>

        {% for m in meals %}
            <div class="border rounded p-2 mb-2">
                <b>{{ m.meal_type }}</b> ({{ m.calories }} kcal)<br>
                <small>{{ m.description }}</small>
            </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
